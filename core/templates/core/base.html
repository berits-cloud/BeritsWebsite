{% load static %}<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Berit Andres — ruhiges, durchdachtes Webdesign für kleine Unternehmen und Kreative.{% endblock %}">
    <title>{% block title %}Berit Andres — Webdesign{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="page-{% block body_class %}default{% endblock %}">

<header class="site-header" id="siteHeader">
    <div class="container nav-wrap">
        <a href="{% url 'core:home' %}" class="brand">
            <span class="nav-logo">Berit <em>Andres</em></span>
        </a>

        <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Menü öffnen">
        <label for="nav-toggle" class="nav-burger" aria-hidden="true">
            <span></span><span></span><span></span>
        </label>

        <nav class="site-nav" aria-label="Hauptnavigation">
            <a href="{% url 'core:home' %}">Start</a>
            <a href="{% url 'core:leistungen' %}">Leistungen</a>
            <a href="{% url 'core:portfolio' %}">Portfolio</a>
            <a href="{% url 'core:ueber' %}">Über mich</a>
            <a href="{% url 'core:kontakt' %}" class="nav-cta">Kontakt</a>
        </nav>
    </div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="site-footer">
    <div class="container footer-bar">
        <small>© {% now "Y" %} Berit Andres Studio</small>
        <nav class="footer-legal" aria-label="Rechtliches">
            <a href="{% url 'core:impressum' %}">Impressum</a>
            <a href="{% url 'core:datenschutz' %}">Datenschutz</a>
        </nav>
        <small>Gestaltet mit Liebe zum Detail</small>
    </div>
</footer>

<script>
    // Header bekommt beim Scrollen einen festen Hintergrund (cremefarben + dunkle Schrift)
    (function () {
        var header = document.getElementById('siteHeader');
        if (!header) return;
        var onScroll = function () {
            if (window.scrollY > 40) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        };
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
    })();
</script>

</body>
</html>
